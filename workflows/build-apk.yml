name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Initialize Bubblewrap project
        run: |
          mkdir -p apk-build
          cd apk-build
          bubblewrap init \
            --manifest "https://dearenporis2-ui.github.io/Apk-testing/manifest.json" \
            --directory . \
            --skipPwaValidation
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipSigning
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: AXIS-debug.apk
          path: apk-build/app-debug.apk
          if-no-files-found: warn
