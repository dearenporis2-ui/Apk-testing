name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json

      - name: Initialize Bubblewrap with answers
        run: |
          mkdir -p apk-build
          cd apk-build
          printf 'N\ndearenporis2-ui.github.io\n/Apk-testing/\nAXIS Studio\nAXIS\n#050505\n#050505\n#050505\nhttps://dearenporis2-ui.github.io/Apk-testing/icons/icon-512.png\nhttps://dearenporis2-ui.github.io/Apk-testing/icons/icon-512.png\n1\n1.0.0\nandroid.keystore\nandroid\nandroid\nandroid\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n' | bubblewrap init \
            --manifest "https://dearenporis2-ui.github.io/Apk-testing/manifest.json" \
            --skipPwaValidation

      - name: Build APK
        run: |
          cd apk-build
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AXIS-debug
          path: apk-build/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
