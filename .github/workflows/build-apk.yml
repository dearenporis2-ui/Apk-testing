name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create Bubblewrap config to skip JDK prompt
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Initialize Bubblewrap project
        run: |
          mkdir -p apk-build
          cd apk-build
          echo "N" | bubblewrap init \
            --manifest "https://dearenporis2-ui.github.io/Apk-testing/manifest.json" \
            --skipPwaValidation

      - name: Build APK
        run: |
          cd apk-build
          echo "N" | bubblewrap build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AXIS-debug
          path: |
            apk-build/app-debug.apk
            apk-build/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
